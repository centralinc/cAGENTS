name: Canary Release

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canary:
    name: Publish Canary
    needs: []
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm -w i

      - name: Download CI binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: binary-*
          merge-multiple: false

      - name: Organize binaries for npm package
        run: |
          mkdir -p packages/cagents/bin

          # Map CI artifact names to npm binary names
          # CI uses runner.os (Linux/macOS/Windows) and runner.arch (X64/ARM64)
          # npm expects platform names (linux/darwin/win32) and arch (x64/arm64)

          # Linux X64
          if [ -d "artifacts/binary-Linux-X64" ]; then
            cp artifacts/binary-Linux-X64/cagents packages/cagents/bin/cagents-linux-x64
          fi

          # macOS X64
          if [ -d "artifacts/binary-macOS-X64" ]; then
            cp artifacts/binary-macOS-X64/cagents packages/cagents/bin/cagents-darwin-x64
          fi

          # macOS ARM64
          if [ -d "artifacts/binary-macOS-ARM64" ]; then
            cp artifacts/binary-macOS-ARM64/cagents packages/cagents/bin/cagents-darwin-arm64
          fi

          # Windows X64
          if [ -d "artifacts/binary-Windows-X64" ]; then
            cp artifacts/binary-Windows-X64/cagents.exe packages/cagents/bin/cagents-win32-x64.exe
          fi

          # Set permissions
          chmod +x packages/cagents/bin/cagents-* 2>/dev/null || true

          echo "Binaries packaged:"
          ls -lah packages/cagents/bin/

      - name: Build npm package
        run: pnpm --filter cagents run build

      - name: Create canary version
        run: |
          # Create a temporary changeset if none exist
          if [ ! "$(ls -A .changeset/*.md 2>/dev/null | grep -v README)" ]; then
            cat << EOF > .changeset/canary-release.md
          ---
          "cagents": patch
          ---

          Canary release from PR #${{ github.event.pull_request.number }}
          EOF
          fi

          # Generate snapshot version
          pnpm changeset version --snapshot canary

          # Get the new version
          VERSION=$(node -p "require('./packages/cagents/package.json').version")
          echo "CANARY_VERSION=$VERSION" >> $GITHUB_ENV

          echo "Generated canary version: $VERSION"

      - name: Publish to npm with @canary tag
        run: cd packages/cagents && npm publish --tag canary --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = process.env.CANARY_VERSION;
            const body = `🚀 **Canary version published!**

            \`\`\`bash
            npm install cagents@${version}
            # or
            npm install cagents@canary
            \`\`\`

            This version will be available for testing until the next canary is published.`;

            // Find existing canary comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Canary version published')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
